services:
  # Building the Database building
  postgres-db:
    image: postgis/postgis:15-3.3-alpine # Supports spatial types
    container_name: rideshare-db-container
    environment:
      - POSTGRES_USER=kiran
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=rideshare_db
    ports:
      - "5432:5432"
    networks:
      - rideshare-system-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiran -d rideshare_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis-cache:
    image: redis:7-alpine
    container_name: rideshare-redis-container
    ports:
      - "6379:6379"
    networks:
      - rideshare-system-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rideshare-kafka-container
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - rideshare-system-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  rideshare-system-network:
    driver: bridge