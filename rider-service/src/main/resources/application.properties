spring.application.name=rider-service
# These variables will be filled by your Docker Compose file later
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# This tells Hibernate to create tables automatically for your Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Broker
spring.kafka.bootstrap-servers=kafka:29092

# PRODUCER: How Rider-Service SENDS TripEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Ensures the type info is sent so the Driver-Service knows it's a 'TripEvent'
spring.kafka.producer.properties.spring.json.add.type.headers=true

# CONSUMER: How Rider-Service RECEIVES TripEventCompensation
spring.kafka.consumer.group-id=rider-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialization: How to turn bytes back into Java Objects
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Tell the Safety Blanket which deserializer to use internally
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer

# Ensure the package is trusted
spring.kafka.consumer.properties.spring.json.trusted.packages=com.kiran.ridersharing.event,com.kiran.driversharing.event
# Map the incoming Driver-Service class name to your local Rider-Service class
spring.kafka.consumer.properties.spring.json.type.mapping=com.kiran.driversharing.event.TripEventCompensation:com.kiran.ridersharing.event.TripEventCompensation
# This helps if the header is missing, but 'trusted.packages' is the main guard
spring.kafka.consumer.properties.spring.json.value.default.type=com.kiran.ridersharing.event.TripEventCompensation

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.driverService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.driverService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.driverService.sliding-window-size=5
resilience4j.circuitbreaker.instances.driverService.register-health-indicator=true